services:
  mariadb:
    image: docker.io/library/mariadb:11.4
    container_name: goathena-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-goathena}
      MARIADB_DATABASE: ${DB_NAME:-goathena}
      MARIADB_USER: ${DB_USER:-goathena}
      MARIADB_PASSWORD: ${DB_PASSWORD:-goathena}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb-buffer-pool-size=1G"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - goathena

  valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: goathena-valkey
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - goathena

  nats:
    image: docker.io/library/nats:2-alpine
    container_name: goathena-nats
    command: ["nats-server", "-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - goathena

  migrate:
    build:
      context: .
      dockerfile: Containerfile.migrate
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      DB_DRIVER: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-goathena}
      DB_PASSWORD: ${DB_PASSWORD:-goathena}
      DB_NAME: ${DB_NAME:-goathena}
      DB_SSL_MODE: "false"
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      NATS_URL: nats://nats:4222
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - goathena

  identity:
    build:
      context: .
      dockerfile: Containerfile
      target: runtime
      args:
        BINARY: identity
        VERSION: ${VERSION:-dev}
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: goathena/identity:dev
    container_name: goathena-identity
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      APP_NAME: goathena-identity
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      DB_DRIVER: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-goathena}
      DB_PASSWORD: ${DB_PASSWORD:-goathena}
      DB_NAME: ${DB_NAME:-goathena}
      DB_SSL_MODE: "false"
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_SERVICE_NAME: goathena-identity
    ports:
      - "8080:8080"
      - "50051:50051"
    healthcheck:
      test: ["CMD", "/healthcheck", "-url", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - goathena

  gateway:
    build:
      context: .
      dockerfile: Containerfile
      target: runtime
      args:
        BINARY: gateway
        VERSION: ${VERSION:-dev}
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: goathena/gateway:dev
    container_name: goathena-gateway
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      APP_NAME: goathena-gateway
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8081
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50052
      GATEWAY_TCP_HOST: 0.0.0.0
      GATEWAY_TCP_PORT: 6900
      GATEWAY_WS_HOST: 0.0.0.0
      GATEWAY_WS_PORT: 6901
      IDENTITY_HOST: identity
      IDENTITY_GRPC_PORT: 50051
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_SERVICE_NAME: goathena-gateway
    ports:
      - "6900:6900"
      - "6901:6901"
      - "8081:8081"
      - "50052:50052"
    healthcheck:
      test: ["CMD", "/healthcheck", "-url", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      identity:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - goathena

  zone:
    build:
      context: .
      dockerfile: Containerfile
      target: runtime
      args:
        BINARY: zone
        VERSION: ${VERSION:-dev}
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: goathena/zone:dev
    container_name: goathena-zone-1
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      APP_NAME: goathena-zone-1
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8082
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 7121
      ZONE_ID: zone-1
      ZONE_NAME: zone-1
      DB_DRIVER: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-goathena}
      DB_PASSWORD: ${DB_PASSWORD:-goathena}
      DB_NAME: ${DB_NAME:-goathena}
      DB_SSL_MODE: "false"
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      NATS_URL: nats://nats:4222
      MAP_DATA_DIR: /var/lib/goathena/maps
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_SERVICE_NAME: goathena-zone-1
    ports:
      - "8082:8082"
      - "7121:7121"
    healthcheck:
      test: ["CMD", "/healthcheck", "-url", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      identity:
        condition: service_healthy
    volumes:
      - map-data:/var/lib/goathena/maps:ro
    mem_limit: 2g
    restart: unless-stopped
    networks:
      - goathena

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.114.0
    container_name: goathena-otel-collector
    profiles:
      - observability
    command:
      - --config=/etc/otelcol/config.yaml
    volumes:
      - ./deployments/observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    networks:
      - goathena

  prometheus:
    image: docker.io/prom/prometheus:v3.0.1
    container_name: goathena-prometheus
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./deployments/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - goathena

  grafana:
    image: docker.io/grafana/grafana:11.4.0
    container_name: goathena-grafana
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - goathena

volumes:
  mariadb_data:
  valkey_data:
  prometheus_data:
  grafana_data:
  map-data:

networks:
  goathena:
    driver: bridge
