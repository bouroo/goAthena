app:
  name: goathena
  environment: development
  host: 0.0.0.0
  port: 8080
  shutdown_timeout: 15s

http:
  host: 0.0.0.0
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  body_limit: 1M
  health_probe_timeout: 5s
  cors_allow_origins:
    - "*"
  cors_allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  cors_allow_headers:
    - Authorization
    - Content-Type
    - X-Request-ID

grpc:
  host: 0.0.0.0
  port: 50051

db:
  driver: mariadb
  host: localhost
  port: 3306
  name: goathena
  user: goathena
  password: goathena
  ssl_mode: "false"
  max_conns: 10
  max_idle_conns: 2
  max_conn_idle: 30m
  max_conn_life: 1h
  connect_timeout: 5s

valkey:
  host: localhost
  port: 6379
  password: ""
  db: 0

nats:
  url: nats://localhost:4222
  connect_timeout: 5s

gateway:
  tcp:
    addr: ":6900"
  ws:
    addr: ":6901"
    path: "/ws/"
    allowed_origins: []
  packetver: 20250604
  identity_addr: "localhost:50051"
  zone_addr: "localhost:50052"
  map_addr: "localhost:5121"

identity:
  use_md5_passwords: false
  max_chars: 15
  item_db_path: ""

zone:
  tick_rate: 50ms
  map_dir: ./data/maps
  default_map: prontera
  move_speed: 150
  shutdown_grace: 30s
  mob_db_path: ./data/mob_db/mob_db.yml
  # Optional rAthena skill database used by gateway skill dispatch.
  skill_db_path: ""
  # Optional rAthena job EXP database used by stats domain; empty falls back to the hardcoded BaseExp table.
  job_exp_db_path: ""
  mob_spawns_path: ./data/mob_spawns/prontera.yml
  script_dir: ./data/npc
  script_reload_interval: 0s
  renewal: false

assets:
  enabled: false
  grf_dir: ./data/grf
  max_cache_mb: 256

log:
  level: info
  format: json

otel:
  exporter: none
  endpoint: http://localhost:4318
  service_name: goathena
  sampling: 1.0
