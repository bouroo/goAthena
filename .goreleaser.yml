version: 2

project_name: goathena

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: migrate
    main: ./cmd/migrate
    binary: migrate
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.CommitSHA={{.Commit}}
      - -X main.BuildTime={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

kos: []
# Docker images are handled by goreleaser docker pipe if desired; keep minimal single binary for now (gateway/identity/zone arrive in the next task).
