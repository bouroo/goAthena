apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: zone-fleet
  namespace: goathena
  labels:
    app.kubernetes.io/name: goathena
    app.kubernetes.io/component: zone
spec:
  replicas: 4
  scheduling: Packed
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goathena
        app.kubernetes.io/component: zone
    spec:
      container: zone
      ports:
        - name: grpc
          portPolicy: Static
          containerPort: 7121
          hostPort: 7121
          protocol: TCP
      health:
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 3
      sdkServer:
        logLevel: Info
        grpcPort: 9357
        httpPort: 9358
      template:
        metadata:
          labels:
            app.kubernetes.io/name: goathena
            app.kubernetes.io/component: zone
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: zone
              image: ghcr.io/bouroo/goathena-zone:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: APP_ENVIRONMENT
                  value: production
                - name: GRPC_HOST
                  value: "0.0.0.0"
                - name: GRPC_PORT
                  value: "7121"
                - name: NATS_URL
                  value: "nats://nats.goathena.svc.cluster.local:4222"
                - name: VALKEY_HOST
                  value: "valkey.goathena.svc.cluster.local"
                - name: DB_HOST
                  value: "mariadb.goathena.svc.cluster.local"
              resources:
                requests:
                  memory: 1Gi
                  cpu: 1000m
                limits:
                  memory: 2Gi
                  cpu: 2000m
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: map-data
                  mountPath: /data/maps
                  readOnly: true
          volumes:
            - name: map-data
              persistentVolumeClaim:
                claimName: zone-map-data
