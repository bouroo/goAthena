syntax = "proto3";

package identity.v1;

option go_package = "github.com/bouroo/goAthena/api/pb/identity/v1;identityv1";

// IdentityService handles login authentication, character CRUD, warehouse,
// and inventory operations. The gateway forwards decoded kRO login
// packets here as structured RPCs.
//
// Login handshake reference: rathena/src/login/loginclif.cpp
// Inventory reference:      rathena/src/map/clif.cpp (CZ_USE_ITEM / CZ_REQ_EQUIP / ZC_ACK_REQ_EQUIP)
service IdentityService {
  // Authenticate processes a client login (CA_LOGIN* variants 0x64/0x1dd/0x1fa/0x27c/...).
  // Returns auth result + char-server list on success (AC_ACCEPT_LOGIN 0xac4).
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);

  // GetCharacterList returns the character list for an authenticated account
  // (HC_ACCEPT_ENTER 0x6b). Called after the client connects to the char server.
  rpc GetCharacterList(GetCharacterListRequest) returns (GetCharacterListResponse);

  // GetCharacter returns the full character detail (name, class, level,
  // HP, hair, equipment, sex) for a single character on an authenticated
  // account. The gateway calls this on CZ_ENTER to populate the entity
  // spawn packet (ZC_SPAWN_UNIT 0x09fe) with real character data.
  rpc GetCharacter(GetCharacterRequest) returns (GetCharacterResponse);

  // GetInventory returns every item the character owns. Backed by the
  // `inventory` table (rathena/sql-files/main.sql); consumed by the
  // gateway when building the inventory view on map enter and after
  // each successful item mutation.
  rpc GetInventory(GetInventoryRequest) returns (GetInventoryResponse);

  // EquipItem moves an item from the inventory grid to an equipment slot
  // (CZ_REQ_EQUIP / ZC_ACK_REQ_EQUIP). The equip position is the rAthena
  // EQP_* bitmask (pc.h). Item ownership by the calling character is
  // enforced server-side.
  rpc EquipItem(EquipItemRequest) returns (EquipItemResponse);

  // UnequipItem moves an equipped item back into the inventory grid
  // (equip bitmask cleared to 0).
  rpc UnequipItem(UnequipItemRequest) returns (UnequipItemResponse);

  // UseItem decrements the stack count of an item by one. When the
  // remaining amount reaches zero the row is deleted. Consumables only;
  // equipment items are not stackable on rAthena's wire.
  rpc UseItem(UseItemRequest) returns (UseItemResponse);
}

// AuthMethod identifies which CA_LOGIN variant the client sent.
enum AuthMethod {
  AUTH_METHOD_UNSPECIFIED = 0;
  AUTH_METHOD_PASSWORD = 1;       // CA_LOGIN 0x0064 (plaintext password)
  AUTH_METHOD_MD5 = 2;            // CA_LOGIN2 0x01dd (MD5 password)
  AUTH_METHOD_MD5_SALTED = 3;     // CA_LOGIN3/4 0x01fa/0x027c
  AUTH_METHOD_PCBANG = 4;         // CA_LOGIN_PCBANG 0x0277
  AUTH_METHOD_CHANNEL = 5;        // CA_LOGIN_CHANNEL 0x02b0
  AUTH_METHOD_SSO = 6;            // CA_SSO_LOGIN_REQ 0x0825
}

message AuthenticateRequest {
  string username = 1;
  bytes password = 2;        // plaintext (AUTH_METHOD_PASSWORD) or MD5 digest
  uint32 client_type = 3;   // kRO client type code
  uint32 packetver = 4;     // client PACKETVER date (e.g. 20130807)
  string client_ip = 5;
  AuthMethod method = 6;
  bytes md5_salt = 7;       // salt from CA_REQ_HASH/AC_ACK_HASH exchange (if applicable)
}

enum AuthResult {
  AUTH_RESULT_UNSPECIFIED = 0;
  AUTH_RESULT_OK = 1;
  AUTH_RESULT_REJECTED = 2;          // AC_REFUSE_LOGIN — wrong credentials
  AUTH_RESULT_BANNED = 3;
  AUTH_RESULT_ALREADY_LOGGED_IN = 4;
  AUTH_RESULT_SERVER_CLOSED = 5;     // SC_NOTIFY_BAN
}

message AuthenticateResponse {
  AuthResult result = 1;
  uint32 error_code = 2;     // kRO-specific error code (0-15, 99-104)
  uint32 account_id = 3;
  fixed64 login_id1 = 4;    // session token minted on success
  fixed64 login_id2 = 5;
  string last_ip = 6;
  string last_login = 7;
  string sex = 8;           // "M", "F", or "S"
  string token = 9;         // web auth token (PACKETVER >= 20170315)
  repeated CharServerInfo char_servers = 10;
}

message CharServerInfo {
  string ip = 1;
  uint32 port = 2;
  string name = 3;
  uint32 users = 4;
  uint32 server_type = 5;
  string new_display = 6;
}

message GetCharacterListRequest {
  uint32 account_id = 1;
  fixed64 login_id1 = 2;   // from AuthenticateResponse
  string sex = 3;
}

message CharacterInfo {
  uint32 char_id = 1;
  uint32 slot = 2;
  string name = 3;
  uint32 class_id = 4;
  uint32 base_level = 5;
  uint32 job_level = 6;
}

message GetCharacterListResponse {
  repeated CharacterInfo characters = 1;
  uint32 total_slots = 2;
  uint32 premium_start = 3;
  uint32 premium_end = 4;
}

message GetCharacterRequest {
  uint32 account_id = 1;
  uint32 char_id = 2;
}

message CharacterDetail {
  uint32 char_id = 1;
  string name = 2;
  uint32 class_id = 3;
  uint32 base_level = 4;
  uint32 job_level = 5;
  uint32 hp = 6;
  uint32 max_hp = 7;
  uint32 sp = 8;
  uint32 max_sp = 9;
  uint32 hair = 10;
  uint32 hair_color = 11;
  uint32 clothes_color = 12;
  uint32 weapon = 13;
  uint32 shield = 14;
  uint32 head_top = 15;
  uint32 head_mid = 16;
  uint32 head_bottom = 17;
  uint32 robe = 18;
  uint32 sex = 19;
  uint32 str = 20;
  uint32 agi = 21;
  uint32 vit = 22;
  uint32 int = 23;
  uint32 dex = 24;
  uint32 luk = 25;
  uint32 status_point = 26;
  uint32 skill_point = 27;
}

message GetCharacterResponse {
  bool success = 1;
  CharacterDetail character = 2;
  string error = 3;
}

// GetInventoryRequest asks for every inventory item belonging to (account_id, char_id).
// The account_id is a defensive cross-check; today the inventory is keyed
// only by char_id, but carrying account_id lets the service refuse a
// cross-account fetch before any DB round-trip.
message GetInventoryRequest {
  uint32 account_id = 1;
  uint32 char_id = 2;
}

// InventoryItem is the wire-relevant subset of `inventory` (rathena
// main.sql). Cards, refine bless/curse, options, expire_time, favorite,
// bound, unique_id, equip_switch and enchantgrade are omitted for now
// — they can be added as separate proto fields without breaking the
// wire layout (they live at higher field numbers).
message InventoryItem {
  uint32 id = 1;          // `id` — primary key
  uint32 nameid = 2;      // `nameid` — item_db.yml id
  uint32 amount = 3;      // `amount` — stack count
  uint32 equip = 4;       // `equip` — EQP_* bitmask; 0 = in grid
  uint32 identify = 5;    // `identify` — 1 = identified
  uint32 refine = 6;      // `refine` — +0..+10
  uint32 attribute = 7;   // `attribute` — broken / elemental flag
}

message GetInventoryResponse {
  repeated InventoryItem items = 1;
}

message EquipItemRequest {
  uint32 account_id = 1;
  uint32 char_id = 2;
  uint32 item_id = 3;
  uint32 equip_position = 4; // EQP_* bitmask (pc.h)
}

message EquipItemResponse {
  bool success = 1;
  uint32 item_id = 2;
  uint32 equip_position = 3;
  string error = 4; // populated when success=false
}

message UnequipItemRequest {
  uint32 account_id = 1;
  uint32 char_id = 2;
  uint32 item_id = 3;
}

message UnequipItemResponse {
  bool success = 1;
  uint32 item_id = 2;
  uint32 equip_position = 3; // the EQP_* bitmask before the row was cleared
  string error = 4;
}

message UseItemRequest {
  uint32 account_id = 1;
  uint32 char_id = 2;
  uint32 item_id = 3;
}

message UseItemResponse {
  bool success = 1;
  uint32 item_id = 2;
  uint32 remaining_amount = 3; // stack size after the use, 0 if row was deleted
  string error = 4;
}