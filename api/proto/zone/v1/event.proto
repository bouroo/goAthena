syntax = "proto3";

package zone.v1;

option go_package = "github.com/bouroo/goAthena/api/pb/zone/v1;zonev1";

// ZoneEvent represents an event occurring within a zone (map).
// These events are broadcast via NATS.
message ZoneEvent {
  oneof event {
    EntityMoved moved = 1;
    EntitySpawned spawned = 2;
    EntityVanished vanished = 3;
    EntityDamaged damaged = 4;  // HP changed (not necessarily death)
    EntityKilled killed = 5;    // Entity died (HP <= 0)
    ItemDropped dropped = 6;    // Ground item appeared
    ItemPickedUp picked_up = 7; // Ground item collected
    TradeRequested requested = 8;
    TradeItemAdded item_added = 9;
    TradeZenyAdded zeny_added = 10;
    TradeConfirmed confirmed = 11;
    TradeCompleted completed = 12;
    TradeCancelled cancelled = 13;
    ChatMessage chat = 14;      // Chat message (whisper/party/map)
  }
}

// EntityMoved indicates an entity has started moving to a new cell.
message EntityMoved {
  uint32 entity_id = 1;
  uint32 dest_x = 2;
  uint32 dest_y = 3;
  uint32 src_x = 4;
  uint32 src_y = 5;
  uint64 move_start_time = 6; // Unix timestamp in milliseconds
}

// EntitySpawned indicates an entity appeared in the map.
message EntitySpawned {
  uint32 entity_id = 1;
  uint32 entity_type = 2; // Matches domain.EntityType
  uint32 x = 3;
  uint32 y = 4;
  string name = 5;
}

// EntityVanished indicates an entity disappeared from the map.
message EntityVanished {
  uint32 entity_id = 1;
  uint32 type = 2; // 0=out of sight, 1=logged out, 2=teleported, etc.
}

// EntityDamaged indicates an entity's HP changed (not necessarily death).
message EntityDamaged {
  uint32 entity_id = 1;
  int32 damage = 2;
  int32 new_hp = 3;
  int32 max_hp = 4;
}

// EntityKilled indicates an entity died (HP <= 0).
message EntityKilled {
  uint32 entity_id = 1;
  int32 damage_dealt = 2;
}

// ItemDropped indicates a ground item appeared on the map.
message ItemDropped {
  uint32 ground_item_id = 1;
  uint32 item_id = 2;          // numeric item ID
  int32 amount = 3;            // stack amount
  uint32 x = 4;
  uint32 y = 5;
  string map_name = 6;
}

// ItemPickedUp indicates a ground item was collected by a player.
message ItemPickedUp {
  uint32 ground_item_id = 1;
  uint32 item_id = 2;
  int32 amount = 3;
  uint32 player_id = 4;        // entity ID of player who picked it up
}

message TradeRequested {
  string trade_id = 1;
  uint32 requester_char_id = 2;
  uint32 target_char_id = 3;
}

message TradeItemAdded {
  string trade_id = 1;
  uint32 char_id = 2;
  uint32 item_id = 3;
  int32 amount = 4;
}

message TradeZenyAdded {
  string trade_id = 1;
  uint32 char_id = 2;
  uint32 zeny = 3;
}

message TradeConfirmed {
  string trade_id = 1;
  uint32 char_id = 2;
}

message TradeCompleted {
  string trade_id = 1;
}

message TradeCancelled {
  string trade_id = 1;
  uint32 char_id = 2;
}

// ChatMessage represents any chat message sent by a player
message ChatMessage {
  uint32 sender_char_id = 1;
  string sender_name = 2;
  string content = 3;
  ChatType type = 4;
  oneof target {
    uint32 target_char_id = 5;       // For whisper
    string party_id = 6;             // For party chat
    string map_name = 7;              // For map chat
  }
}

enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_WHISPER = 1;             // Private message
  CHAT_TYPE_PARTY = 2;               // Party chat
  CHAT_TYPE_MAP = 3;                 // Map-wide chat
}
