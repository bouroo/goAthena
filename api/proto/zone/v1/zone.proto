syntax = "proto3";

package zone.v1;

option go_package = "github.com/bouroo/goAthena/api/pb/zone/v1;zonev1";

// ZoneService manages map instances, entity state, and cross-zone transit.
// The gateway forwards decoded map-server packets here.
//
// Map entry reference: rathena/src/map/clif.cpp clif_parse_WantToConnection
service ZoneService {
  // EnterZone processes a client's map-server entry (CZ_ENTER 0x0072 /
  // WantToConnection). Validates the session and assigns the player to a
  // map instance.
  rpc EnterZone(EnterZoneRequest) returns (EnterZoneResponse);

  // MoveEntity processes a client's move-to-cell request (CZ_REQUEST_MOVE
  // 0x0085 / WalkToXY). Computes an A* path on the entity and returns
  // the source position (cell the move started from) plus the
  // destination (cell the path targets). The gateway uses src+dest to
  // encode the broadcast packet ZC_NOTIFY_PLAYERMOVE 0x0087.
  rpc MoveEntity(MoveEntityRequest) returns (MoveEntityResponse);

  // AttackEntity processes a client's attack action (CZ_ACTION_REQUEST
  // 0x0092 / ActionRequest). The zone validates the target entity, computes
  // damage, updates HP, and may kill the entity. The gateway uses the response
  // to encode ZC_NOTIFY_ACT and ZC_NOTIFY_EFFECT packets.
  rpc AttackEntity(AttackEntityRequest) returns (AttackEntityResponse);

  // PickupItem processes a client's ground-item pickup request (CZ_ITEM_PICKUP
  // 0x0092 / ItemPickup). Validates the item exists, is in range, and is
  // pickable. Returns success or error.
  rpc PickupItem(PickupItemRequest) returns (PickupItemResponse);

  // RequestTrade initiates a trade request from one player to another.
  rpc RequestTrade(RequestTradeRequest) returns (RequestTradeResponse);

  // AddTradeItem adds an item to the trade window.
  rpc AddTradeItem(AddTradeItemRequest) returns (AddTradeItemResponse);

  // AddTradeZeny adds zeny to the trade window.
  rpc AddTradeZeny(AddTradeZenyRequest) returns (AddTradeZenyResponse);

  // ConfirmTrade locks the current trade offer (ready state).
  rpc ConfirmTrade(ConfirmTradeRequest) returns (ConfirmTradeResponse);

  // CompleteTrade executes the atomic item/zeny transfer (both parties confirmed).
  rpc CompleteTrade(CompleteTradeRequest) returns (CompleteTradeResponse);

  // CancelTrade aborts the current trade session.
  rpc CancelTrade(CancelTradeRequest) returns (CancelTradeResponse);

  // OpenStorage opens a character's storage session for operations
  rpc OpenStorage(OpenStorageRequest) returns (OpenStorageResponse);

  // DepositItem moves an item from character inventory to storage
  rpc DepositItem(DepositItemRequest) returns (DepositItemResponse);

  // WithdrawItem moves an item from storage to character inventory
  rpc WithdrawItem(WithdrawItemRequest) returns (WithdrawItemResponse);

  // CloseStorage closes a character's storage session
  rpc CloseStorage(CloseStorageRequest) returns (CloseStorageResponse);

  // Whisper sends a private message
  rpc Whisper(WhisperRequest) returns (WhisperResponse);

  // SendPartyChat sends a message to party members
  rpc SendPartyChat(SendPartyChatRequest) returns (SendPartyChatResponse);

  // SendMapChat sends a message to players on the same map
  rpc SendMapChat(SendMapChatRequest) returns (SendMapChatResponse);

  // SendFriendRequest sends a friend request
  rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse);

  // AcceptFriendRequest accepts a friend request
  rpc AcceptFriendRequest(AcceptFriendRequestRequest) returns (AcceptFriendRequestResponse);

  // RejectFriendRequest rejects a friend request
  rpc RejectFriendRequest(RejectFriendRequestRequest) returns (RejectFriendRequestResponse);

  // RemoveFriend removes a friend
  rpc RemoveFriend(RemoveFriendRequest) returns (RemoveFriendResponse);

  // ListFriends returns the friend list
  rpc ListFriends(ListFriendsRequest) returns (ListFriendsResponse);

  // CreateParty creates a new party
  rpc CreateParty(CreatePartyRequest) returns (CreatePartyResponse);

  // JoinParty adds a character to a party
  rpc JoinParty(JoinPartyRequest) returns (JoinPartyResponse);

  // LeaveParty removes a character from a party
  rpc LeaveParty(LeavePartyRequest) returns (LeavePartyResponse);

  // GetParty returns party info
  rpc GetParty(GetPartyRequest) returns (GetPartyResponse);
}

message EnterZoneRequest {
  uint32 account_id = 1;
  uint32 char_id = 2;
  fixed64 login_id1 = 3;    // from identity.Authenticate
  uint32 client_tick = 4;
  string sex = 5;
  uint32 packetver = 6;
  string client_ip = 7;
}

message EnterZoneResponse {
  bool success = 1;
  string map_name = 2;
  uint32 map_x = 3;
  uint32 map_y = 4;
  string error = 5;         // human-readable error when success == false
}

message MoveEntityRequest {
  uint32 account_id = 1;
  uint32 dest_x = 2;        // destination cell X
  uint32 dest_y = 3;        // destination cell Y
}

message MoveEntityResponse {
  bool success = 1;
  uint32 src_x = 2;         // cell the move started from
  uint32 src_y = 3;
  uint32 dest_x = 4;        // cell the path targets (echoed back)
  uint32 dest_y = 5;
  string error = 6;         // human-readable error when success == false
}

message AttackEntityRequest {
  uint32 entity_id = 1;       // target entity ID
  uint32 damage = 2;          // damage to apply (optional; defaults to 1)
  uint32 attacker_id = 3;     // source entity ID (player/GM)
  uint32 skill_id = 4;        // skill ID used (0 for auto-attack)
  uint32 skill_level = 5;     // skill level (0 if skill_id == 0)
}

message AttackEntityResponse {
  bool success = 1;
  bool target_died = 2;       // true if entity HP <= 0
  int32 damage_applied = 3;   // damage actually applied
  int32 current_hp = 4;       // target's HP after damage
  int32 max_hp = 5;           // target's MaxHP (unchanged)
  string error = 6;           // human-readable error if success == false
}

message PickupItemRequest {
  uint32 ground_item_id = 1;  // ground item ID
  uint32 player_id = 2;       // requesting player entity ID
}

message PickupItemResponse {
  bool success = 1;
  uint32 item_id = 2;         // numeric item ID
  uint32 amount = 3;          // item amount (typically 1)
  string error = 4;           // human-readable error if success == false
}

message RequestTradeRequest {
  uint32 requester_char_id = 1;
  uint32 target_char_id = 2;
}

message RequestTradeResponse {
  bool success = 1;
  string trade_id = 2;       // Assigned trade session ID
  string error = 3;          // Human-readable error if success == false
}

message AddTradeItemRequest {
  string trade_id = 1;
  uint32 char_id = 2;
  uint32 inventory_id = 3;
  int32 amount = 4;
}

message AddTradeItemResponse {
  bool success = 1;
  string error = 2;
}

message AddTradeZenyRequest {
  string trade_id = 1;
  uint32 char_id = 2;
  uint32 zeny = 3;
}

message AddTradeZenyResponse {
  bool success = 1;
  string error = 2;
}

message ConfirmTradeRequest {
  string trade_id = 1;
  uint32 char_id = 2;
}

message ConfirmTradeResponse {
  bool success = 1;
  string error = 2;
}

message CompleteTradeRequest {
  string trade_id = 1;
  uint32 char_id = 2;
}

message CompleteTradeResponse {
  bool success = 1;
  string error = 2;
}

message CancelTradeRequest {
  string trade_id = 1;
  uint32 char_id = 2;
}

message CancelTradeResponse {
  bool success = 1;
  string error = 2;
}

message OpenStorageRequest {
  uint32 char_id = 1;  // Character whose storage to open
}

message OpenStorageResponse {
  bool success = 1;
  string error_message = 2;
  repeated StorageItem items = 3;  // List of items in storage
}

message DepositItemRequest {
  uint32 char_id = 1;
  uint64 inventory_item_id = 2;  // Item ID from character inventory
  int32 amount = 3;  // Amount to deposit (must be > 0)
}

message DepositItemResponse {
  bool success = 1;
  string error_message = 2;
  uint64 storage_item_id = 3;  // ID of the created/updated storage item
}

message WithdrawItemRequest {
  uint32 char_id = 1;
  uint64 storage_item_id = 2;  // Item ID in storage
  int32 amount = 3;  // Amount to withdraw (must be > 0)
}

message WithdrawItemResponse {
  bool success = 1;
  string error_message = 2;
  uint64 inventory_item_id = 3;  // ID of the created/updated inventory item
}

message CloseStorageRequest {
  uint32 char_id = 1;
}

message CloseStorageResponse {
  bool success = 1;
  string error_message = 2;
}

message StorageItem {
  uint64 id = 1;
  uint32 char_id = 2;
  uint32 name_id = 3;
  int32 amount = 4;
  uint32 identify = 5;
  uint32 refine = 6;
  uint32 attribute = 7;
  uint64 card0 = 8;
  uint64 card1 = 9;
  uint64 card2 = 10;
  uint64 card3 = 11;
}

message WhisperRequest {
  uint32 sender_char_id = 1;
  uint32 target_char_id = 2;
  string content = 3;
}

message WhisperResponse {
  bool success = 1;
  string error_message = 2;
}

message SendPartyChatRequest {
  uint32 sender_char_id = 1;
  string content = 2;
}

message SendPartyChatResponse {
  bool success = 1;
  string error_message = 2;
}

message SendMapChatRequest {
  uint32 sender_char_id = 1;
  string map_name = 2;
  string content = 3;
}

message SendMapChatResponse {
  bool success = 1;
  string error_message = 2;
}

message SendFriendRequestRequest {
  uint32 from_account_id = 1;
  uint32 to_account_id = 2;
  string from_name = 3;
  string to_name = 4;
}

message SendFriendRequestResponse {
  bool success = 1;
  string error_message = 2;
  uint64 request_id = 3;
}

message AcceptFriendRequestRequest {
  uint64 request_id = 1;
}

message AcceptFriendRequestResponse {
  bool success = 1;
  string error_message = 2;
}

message RejectFriendRequestRequest {
  uint64 request_id = 1;
}

message RejectFriendRequestResponse {
  bool success = 1;
  string error_message = 2;
}

message RemoveFriendRequest {
  uint32 account_id = 1;
  uint32 friend_account_id = 2;
}

message RemoveFriendResponse {
  bool success = 1;
  string error_message = 2;
}

message ListFriendsRequest {
  uint32 account_id = 1;
}

message ListFriendsResponse {
  bool success = 1;
  string error_message = 2;
  repeated FriendInfo friends = 3;
}

message FriendInfo {
  uint32 account_id = 1;
  uint32 friend_account_id = 2;
  string friend_name = 3;
  bool online = 4;
}

message CreatePartyRequest {
  string name = 1;
  uint32 leader_char_id = 2;
  string leader_name = 3;
}

message CreatePartyResponse {
  bool success = 1;
  string error_message = 2;
  string party_id = 3;
}

message JoinPartyRequest {
  string party_id = 1;
  uint32 char_id = 2;
  string char_name = 3;
}

message JoinPartyResponse {
  bool success = 1;
  string error_message = 2;
}

message LeavePartyRequest {
  string party_id = 1;
  uint32 char_id = 2;
}

message LeavePartyResponse {
  bool success = 1;
  string error_message = 2;
}

message GetPartyRequest {
  string party_id = 1;
}

message GetPartyResponse {
  bool success = 1;
  string error_message = 2;
  PartyInfo party = 3;
}

message PartyInfo {
  string id = 1;
  string name = 2;
  uint32 leader_char_id = 3;
  repeated PartyMemberInfo members = 4;
}

message PartyMemberInfo {
  uint32 char_id = 1;
  string name = 2;
  bool is_leader = 3;
}
