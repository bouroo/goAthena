version: '3'

dotenv:
  - .env

vars:
  BIN_DIR: bin
  COVERAGE_OUT: coverage.out
  GIT_VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

  LDFLAGS: -s -w -X main.Version={{.GIT_VERSION | default "dev"}} -X main.CommitSHA={{.GIT_COMMIT | default "unknown"}} -X main.BuildTime={{.BUILD_TIME | default "unknown"}}

tasks:
  build:
    desc: Build all service binaries (gateway, identity, zone, migrate)
    env:
      CGO_ENABLED: "0"
    deps:
      - build-gateway
      - build-identity
      - build-zone
      - build-migrate

  build-gateway:
    desc: Build the gateway service binary
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BIN_DIR}}/gateway ./cmd/gateway

  build-identity:
    desc: Build the identity service binary
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BIN_DIR}}/identity ./cmd/identity

  build-zone:
    desc: Build the zone service binary
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BIN_DIR}}/zone ./cmd/zone

  build-migrate:
    desc: Build the migrate binary
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BIN_DIR}}/migrate ./cmd/migrate

  run-gateway:
    desc: Build and run the gateway service
    deps:
      - build-gateway
    cmds:
      - ./{{.BIN_DIR}}/gateway

  run-identity:
    desc: Build and run the identity service
    deps:
      - build-identity
    cmds:
      - ./{{.BIN_DIR}}/identity

  run-zone:
    desc: Build and run the zone service
    deps:
      - build-zone
    cmds:
      - ./{{.BIN_DIR}}/zone

  test:
    desc: Run all tests (default unit tag)
    cmds:
      - task: test-unit

  test-unit:
    desc: Run unit tests only
    cmds:
      - go test -race -tags=unit -coverprofile={{.COVERAGE_OUT}} -coverpkg=./internal/...,./pkg/... ./internal/... ./pkg/...

  test-integration:
    desc: Run integration tests (requires mariadb + valkey + nats)
    cmds:
      - go test -v -race -tags=integration ./...

  test-e2e:
    desc: Run end-to-end tests (boots full server)
    cmds:
      - go test -v -race -tags=e2e ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run --timeout=5m ./...

  fmt:
    desc: Format Go source
    cmds:
      - gofumpt -w .
      - goimports -w .

  tidy:
    desc: Tidy go.mod and verify
    cmds:
      - go mod tidy
      - go mod verify

  verify:
    desc: Verify module state and no diff
    cmds:
      - task: tidy
      - git diff --exit-code go.mod go.sum

  generate:
    desc: Generate mocks via go generate
    cmds:
      - go generate ./...

  proto:
    desc: Generate protobuf Go code from api/proto into api/pb
    cmds:
      - protoc
        --go_out=api/pb
        --go_opt=paths=source_relative
        --go-grpc_out=api/pb
        --go-grpc_opt=paths=source_relative
        -I api/proto
        api/proto/identity/v1/identity.proto
        api/proto/zone/v1/zone.proto
        api/proto/zone/v1/event.proto
        api/proto/gateway/v1/gateway.proto

  migrate-up:
    desc: Run database migrations (uses embedded migrations via the migrate binary)
    cmds:
      - task: build-migrate
      - ./{{.BIN_DIR}}/migrate up

  migrate-down:
    desc: Rollback one database migration
    cmds:
      - task: build-migrate
      - ./{{.BIN_DIR}}/migrate down 1

  migrate-create:
    desc: "Create a new migration: task migrate-create NAME=add_users"
    cmds:
      - migrate create -ext sql -dir internal/infrastructure/db/migrations {{.NAME}}

  docker-build:
    desc: Build all service container images (gateway, identity, zone, migrate)
    cmds:
      # TODO: split Containerfile per service; for now build the migrate image
      - docker build -f Containerfile.migrate -t goathena-migrate:latest .

  cover-html:
    desc: Render coverage report to HTML
    cmds:
      - go tool cover -html={{.COVERAGE_OUT}} -o coverage.html